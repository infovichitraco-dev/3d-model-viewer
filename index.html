<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Model Viewer</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0b0b0b;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, #1a1a1a, #000);
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="loading" id="loader">Loading 3D Model...</div>

  <model-viewer
    src="https://raw.githubusercontent.com/infovichitraco-dev/3d-model-viewer/main/model.glb"
    alt="3D Model"

    auto-rotate
    camera-controls

    camera-orbit="0deg 75deg 60%"
    field-of-view="30deg"

    exposure="1.2"
    shadow-intensity="1"

    environment-image="neutral"

    scale="2.5 2.5 2.5"

    onload="document.getElementById('loader').style.display='none'"

    onerror="document.getElementById('loader').innerText='Failed to load model'"
  >
  </model-viewer>

</body>
</html>
