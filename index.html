<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Viewer</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0b0b0b;
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at center, #1a1a1a, #000);
    }

    #loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 14px;
      opacity: 0.7;
    }

    #error {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: red;
      font-size: 13px;
      display: none;
    }
  </style>
</head>

<body>

<div id="loader">Loading 3D Model...</div>
<div id="error">⚠️ Model failed to load</div>

<model-viewer
  id="viewer"

  src="https://raw.githubusercontent.com/infovichitraco-dev/3d-model-viewer/main/model.glb"
  alt="3D Model"

  camera-controls
  auto-rotate
  auto-rotate-delay="0"

  camera-orbit="0deg 75deg 55%"
  min-camera-orbit="auto auto 25%"
  max-camera-orbit="auto auto 120%"

  field-of-view="28deg"
  camera-target="0m 0m 0m"

  exposure="1.3"
  shadow-intensity="1"

  environment-image="neutral"

  interaction-prompt="none"

  style="transform: scale(2.5); transform-origin: center;"
>
</model-viewer>

<script>
  const viewer = document.getElementById('viewer');
  const loader = document.getElementById('loader');
  const error = document.getElementById('error');

  viewer.addEventListener('load', () => {
    loader.style.display = 'none';
  });

  viewer.addEventListener('error', () => {
    loader.style.display = 'none';
    error.style.display = 'block';
    console.error("Model failed to load");
  });

  // Extra debug
  viewer.addEventListener('progress', (e) => {
    console.log("Loading progress:", e.detail.totalProgress);
  });
</script>

</body>
</html>
