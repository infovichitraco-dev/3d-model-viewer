<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>3D Viewer Test</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    body { margin: 0; background-color: #f0f0f0; }
    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: #ffffff;
      border: 5px solid red; /* This helps you see if the viewer is actually there */
    }
  </style>
</head>
<body>

  <model-viewer 
    src="3DDEM.glb" 
    ar 
    camera-controls 
    auto-rotate 
    shadow-intensity="1">
  </model-viewer>

</body>
</html>
