<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Model Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    model-viewer { width: 100%; height: 100%; background-color: #fafafa; }
  </style>
</head>
<body>

  <model-viewer
    src="model.glb"
    alt="Interactive 3D Model"
    auto-rotate
    camera-controls
    shadow-intensity="1"
    ar
    touch-action="pan-y">
  </model-viewer>

</body>
</html>
